<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOTIFY Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box; /* This ensures padding doesn't push boxes out of the screen */
    font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at top,#0f2027,#0a0a0f 60%);
    color:#fff;
    overflow-x: hidden; /* Prevents horizontal scrolling on the whole page */
}

.register-section{
    padding:60px 5%;
    display:flex;
    justify-content:center;
}

.register-container{
    width:100%;
    max-width:900px;
    padding:40px 20px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
}

h1{text-align:center;margin-bottom:10px;}
p{text-align:center;margin-bottom:30px;color:#aaa;}

.qr-preview{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
}

.qr-preview img{
    width:180px;
    height:180px;
    padding:10px;
    border-radius:16px;
    background:#fff;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.full{grid-column:span 2;}

input,select{
    width: 100%; /* Forces the input to fill the grid cell only */
    padding:12px;
    border-radius:10px;
    border:none;
    background:#111;
    color:#fff;
    font-size: 16px; /* Prevents iOS zoom on focus */
}

.member{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,247,255,0.05);
}

.status-message{
    margin-top:20px;
    text-align:center;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* MOBILE FIX: Collapse grid and ensure width containment */
@media(max-width:600px){
    .register-section {
        padding: 30px 10px;
    }
    .form-grid{
        grid-template-columns: 1fr; /* Force inputs into a single column */
    }
    .full{
        grid-column: span 1;
    }
    .register-container {
        padding: 25px 15px;
    }
}
</style>
</head>

<body>

<section class="register-section">
<div class="register-container">

<h1>Event Registration</h1>
<p>Fill your team details</p>

<div class="qr-preview">
<img src="paymentqr.jpeg">
<p>Scan & Pay before registering</p>
</div>

<form id="form">

<div class="form-grid">
<input id="teamName" class="full" placeholder="Team Name" required>

<select id="theme" required>
<option disabled selected value="">Select Theme</option>
<option>Sustainable Development</option>
<option>Open Innovation</option>
</select>

<select id="teamSize" required onchange="generate()">
<option disabled selected value="">Team Size</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<input id="fileUpload" class="full" type="file" accept="image/*" required>
</div>

<div id="members"></div>

<div id="formStatus" class="status-message"></div>

<button type="submit">Register</button>

</form>
</div>
</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwf9sw63pu0e6ymclCLuZ7aaC-7O5Sfu7UHEr2LgZl46DceFGLQ8jibOyIy4_c_3Llg1Q/exec";

// ================= GENERATE MEMBERS =================
function generate(){
    const size = document.getElementById("teamSize").value;
    const container = document.getElementById("members");
    container.innerHTML="";

    for(let i=1;i<=size;i++){
        container.innerHTML += `
        <div class="member">
        <h3>${i==1?"Leader":"Member "+i}</h3>
        <div class="form-grid">
        <input id="name_${i}" placeholder="Name" required>
        <input id="usn_${i}" placeholder="USN" required>
        <input id="phone_${i}" placeholder="Phone" required>
        <input id="email_${i}" placeholder="Email" required>
        <input id="college_${i}" placeholder="College" required>
        <input id="branch_${i}" placeholder="Branch" required>
        <select id="sem_${i}" required>
        <option disabled selected value="">Sem</option>
        <option>2</option><option>4</option><option>6</option><option>8</option>
        </select>
        </div>
        </div>`;
    }
}

// ================= SEND TO BACKEND =================
function sendToBackend(payload) {
    const status = document.getElementById("formStatus");
    status.innerText = "Submitting... Please wait.";

    fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        status.innerText = "✅ Submitted Successfully!";
        document.getElementById("form").reset();
        document.getElementById("members").innerHTML = "";
    })
    .catch(err => {
        status.innerText = "❌ Submission failed. Check your internet connection.";
        console.error(err);
    });
}

// ================= SUBMIT =================
document.getElementById("form").addEventListener("submit", e => {
    e.preventDefault();

    const file = document.getElementById("fileUpload").files[0];

    if (!file) {
        alert("Upload screenshot");
        return;
    }

    const reader = new FileReader();

    reader.onload = function () {

        const data = {
            teamName: document.getElementById("teamName").value,
            theme: document.getElementById("theme").value,
            teamSize: document.getElementById("teamSize").value,

            fileData: reader.result,
            fileName: file.name,
            fileType: file.type
        };

        const size = parseInt(data.teamSize);

        for (let i = 1; i <= size; i++) {
            data[`name_${i}`] = document.getElementById(`name_${i}`)?.value || "";
            data[`usn_${i}`] = document.getElementById(`usn_${i}`)?.value || "";
            data[`phone_${i}`] = document.getElementById(`phone_${i}`)?.value || "";
            data[`email_${i}`] = document.getElementById(`email_${i}`)?.value || "";
            data[`college_${i}`] = document.getElementById(`college_${i}`)?.value || "";
            data[`branch_${i}`] = document.getElementById(`branch_${i}`)?.value || "";
            data[`sem_${i}`] = document.getElementById(`sem_${i}`)?.value || "";
        }

        sendToBackend(data);

    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
